name: Validate mpackage file

on:
  pull_request:
    paths: 
      - 'packages/*.mpackage'
      - 'packages/*.zip'

jobs:
  check-mpackage-contents:
    runs-on: ubuntu-latest
    
    steps:
    - name: Skip if all files are deleted
      id: skip-if-deleted
      uses: actions/github-script@v7
      with:
        script: |
          const pr = await github.rest.pulls.listFiles({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.payload.pull_request.number,
          });

          const allDeleted = pr.data.length > 0 && pr.data.every(file => file.status === 'removed');
          core.setOutput('skip', allDeleted);

    - name: Checkout repository
      if: steps.skip-if-deleted.outputs.skip != 'true'
      uses: actions/checkout@master

    - uses: leafo/gh-actions-lua@v10
      if: steps.skip-if-deleted.outputs.skip != 'true'
      with:
        luaVersion: "5.1.5"
      
    - name: Only one file per PR is allowed
      if: steps.skip-if-deleted.outputs.skip != 'true'
      id: check-file-count
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}      
      run: |
        FILE=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path')
        
        # check only 1 file has been uploaded per PR
        if [ `echo "$FILE" |wc -l` -gt 1 ]; then
          echo "Error: Only one package file per pull request please."
          exit 1
        else
          echo "Pass: just one file uploaded."
        fi

        echo "FILE=$FILE" >> $GITHUB_OUTPUT
      
    - name: Unzip the mpackage and check config.lua exists
      if: steps.skip-if-deleted.outputs.skip != 'true'
      id: unzip-mpackage-file
      run: |
        FILE="${{ steps.check-file-count.outputs.FILE }}"
        echo "${FILE}"
        
        # unzip the mpackage
        unzip -q -o "${FILE}" -d unzipped_package
        ls -al unzipped_package

        #only valid if it has a config.lua
        if [ -f "unzipped_package/config.lua" ]; then
          echo "Pass: config.lua is present"
        else
          echo "Error: config.lua is missing."
          exit 1
        fi

    - name: Check config.lua contains all required information
      if: steps.skip-if-deleted.outputs.skip != 'true'
      id: check-config-lua
      run: |
        FILE="${{ steps.check-file-count.outputs.FILE }}"
        
        # grep for some vital details
        if grep -q "mpackage =" unzipped_package/config.lua; then
          echo "Pass: has a valid mpackage name"
        else
          echo "Error: not a valid mpackage file"
          exit 1
        fi

        if grep -q "title =" unzipped_package/config.lua; then
          echo "Pass: has a valid title"
        else
          echo "Error: does not contain a valid title"
          exit 1
        fi
        
        if grep -q "version =" unzipped_package/config.lua; then
          echo "Pass: config.lua contains a version number"
        else
          echo "Error: does not contain a version number"
          exit 1
        fi   

        if grep -q "created =" unzipped_package/config.lua; then
          echo "Pass: has a valid creation date"
        else
          echo "Error: not a valid creation date"
          exit 1
        fi        

        if grep -q "author =" unzipped_package/config.lua; then         
          echo "Pass: has a valid author name"
        else
          echo "Error: does not contain a valid author name"
          exit 1
        fi  

        if grep -q "description =" unzipped_package/config.lua; then
          echo "Pass: has a valid description"      
        else
          echo "Error: does not contain a valid description"
          exit 1
        fi

    - name: Validate dependency format if present
      if: steps.skip-if-deleted.outputs.skip != 'true'
      id: check-dependencies
      run: |
        # Only validate if a dependencies field is present at all
        if ! grep -q "dependencies" unzipped_package/config.lua; then
          echo "Pass: no dependencies field present"
          exit 0
        fi

        # Use Lua to parse the config and validate the dependency spec format
        lua << 'EOF'
        dofile('unzipped_package/config.lua')
        local deps = _G['dependencies']

        if deps == nil or deps == "" then
          print("Pass: dependencies is empty or nil")
          os.exit(0)
        end

        -- Validate operator characters used in constraint strings
        local function validateSpec(spec)
          spec = spec:match("^%s*(.-)%s*$")
          local colonPos = spec:find(":", 1, true)
          if not colonPos then return true end  -- plain package name, always valid

          local constraintStr = spec:sub(colonPos + 1):match("^%s*(.-)%s*$")
          if constraintStr == "latest" then return true end

          for part in constraintStr:gmatch("[^,]+") do
            part = part:match("^%s*(.-)%s*$")
            local op, ver = part:match("^([><=!~]+)%s*(.+)$")
            if not op or not ver then
              return false, "Invalid constraint format: '" .. part .. "'"
            end
            -- Validate operator
            local validOps = {[">="] = true, [">"] = true, ["<="] = true,
                              ["<"] = true, ["=="] = true, ["="] = true,
                              ["!="] = true, ["~="] = true}
            if not validOps[op] then
              return false, "Unknown operator: '" .. op .. "'"
            end
            -- Version must contain at least one dot (semver style)
            if not ver:find("%.") then
              return false, "Version '" .. ver .. "' does not look like a semver string"
            end
          end
          return true
        end

        if type(deps) == "table" then
          -- New array format: validate each element
          for i, item in ipairs(deps) do
            local ok, err = validateSpec(tostring(item))
            if not ok then
              io.stderr:write("Error: dependency[" .. i .. "] '" .. tostring(item) .. "': " .. err .. "\n")
              os.exit(1)
            end
          end
          print("Pass: " .. #deps .. " dependency spec(s) validated")
        elseif type(deps) == "string" then
          -- Legacy comma-separated string: must be plain package names (no colons)
          for part in deps:gmatch("[^,]+") do
            part = part:match("^%s*(.-)%s*$")
            if part:find(":") then
              io.stderr:write("Error: legacy string format does not support version constraints.\n")
              io.stderr:write("Use the table/array form: dependencies = {\"" .. part .. "\"}\n")
              os.exit(1)
            end
          end
          print("Pass: legacy string dependencies format validated")
        else
          io.stderr:write("Error: dependencies must be a string or an array table\n")
          os.exit(1)
        end
        EOF

    - name: Check for malicious content
      if: steps.skip-if-deleted.outputs.skip != 'true'
      id: check-malicious-content
      run: |
        FILE="${{ steps.check-file-count.outputs.FILE }}"
        if grep -q -R -E 'os\.exec|lfs\.rmdir|sysDataSendRequest' unzipped_package/; then
          echo "::error:: questionable functions or events used, please validate manually"
          exit 1
        else
          echo "Pass: security checks"
        fi

    - name: Extract package name and author, check for duplicates
      if: steps.skip-if-deleted.outputs.skip != 'true'
      id: check-package-name
      run: |
        # Extract the package name and author from config.lua
        PACKAGE_NAME=$(lua -e "dofile('unzipped_package/config.lua'); print(_G['mpackage'])")
        PACKAGE_AUTHOR=$(lua -e "dofile('unzipped_package/config.lua'); print(_G['author'])")
        echo "Package name: $PACKAGE_NAME"
        echo "Package author: $PACKAGE_AUTHOR"
        
        # Get current PR file name
        CURRENT_FILE="${{ steps.check-file-count.outputs.FILE }}"
        CURRENT_BASENAME=$(basename "${CURRENT_FILE}")
        
        # Create temporary directory for checking other packages
        mkdir temp_check
        
        # Extract config.lua from all other packages, excluding current one if it exists
        for package in packages/*.{mpackage,zip}; do
          if [ "$package" != "${CURRENT_FILE}" ]; then
            BASENAME=$(basename "$package")
            unzip -q -o "$package" config.lua -d "temp_check/${BASENAME}"
          fi
        done
        
        # Check for case-insensitive duplicates with different authors
        for config in temp_check/**/config.lua; do
          if [ -f "$config" ]; then
            OTHER_NAME=$(lua -e "dofile('$config'); print(_G['mpackage'])")
            OTHER_AUTHOR=$(lua -e "dofile('$config'); print(_G['author'])")
            if [ "${PACKAGE_NAME,,}" = "${OTHER_NAME,,}" ] && [ "${PACKAGE_AUTHOR,,}" != "${OTHER_AUTHOR,,}" ]; then
              echo "Error: Package name '$PACKAGE_NAME' by '$PACKAGE_AUTHOR' conflicts with existing package '$OTHER_NAME' by '$OTHER_AUTHOR'"
              exit 1
            fi
          fi
        done
        
        echo "Pass: No conflicting package names found"
        echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_OUTPUT
        echo "PACKAGE_AUTHOR=$PACKAGE_AUTHOR" >> $GITHUB_OUTPUT

